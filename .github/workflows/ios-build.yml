name: iOS Flutter Build (macOS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      - name: Flutter doctor
        run: flutter doctor

      - name: Install Flutter dependencies
        working-directory: mobile/roadiq_logger
        run: flutter pub get

      - name: Build iOS app (no signing yet)
        working-directory: mobile/roadiq_logger
        run: flutter build ios --release --no-codesign