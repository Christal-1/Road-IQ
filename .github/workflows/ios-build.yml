name: iOS Flutter Build (macOS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      - name: Flutter doctor
        run: flutter doctor

      - name: Install Flutter dependencies
        working-directory: mobile/roadiq_logger
        run: flutter pub get

      - name: Build iOS app (no signing yet)
        working-directory: mobile/roadiq_logger
        run: flutter build ios --release --no-codesign

      - name: Debug build output path
        working-directory: mobile/roadiq_logger
        run: |
          echo "Listing build directory"
          ls -la build/ios
          ls -la build/ios/iphoneos || true

      - name: Zip build output
        working-directory: mobile/roadiq_logger
        run: |
          mkdir -p artifact
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            cd build/ios/iphoneos
            zip -r "${GITHUB_WORKSPACE}/artifact/Runner-ios.zip" Runner.app
          else
            echo "Runner.app not found in build/ios/iphoneos"
            ls -la build/ios/iphoneos
            exit 1
          fi

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: artifact/Runner-ios.zip